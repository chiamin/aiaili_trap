<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我愛陷阱題</title>
<style>
  :root {
    --bg: #fff7ed;
    --card: #ffffff;
    --accent: #f97316;
    --accent-dark: #ea580c;
    --ok: #16a34a;
    --bad: #dc2626;
    --ink: #1f2937;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  h1 {
    font-size: 2rem;
    margin: 12px 0 4px;
    color: var(--accent-dark);
  }
  .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 0.95rem; }
  .card {
    background: var(--card);
    width: 100%;
    max-width: 560px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 28px 26px 30px;
  }
  .tag {
    display: inline-block;
    background: #fff1e6;
    color: var(--accent-dark);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .question {
    font-size: 1.3rem;
    line-height: 1.7;
    margin: 0 0 22px;
    font-weight: 500;
  }
  .answer-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }
  input[type="text"] {
    flex: 1;
    font-size: 1.15rem;
    padding: 12px 14px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    cursor: pointer;
    transition: transform 0.05s, background 0.15s;
  }
  button:active { transform: scale(0.97); }
  .btn-check { background: var(--accent); color: #fff; }
  .btn-check:hover { background: var(--accent-dark); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .btn-secondary {
    background: #fff;
    color: var(--accent-dark);
    border: 2px solid var(--accent);
    flex: 1;
  }
  .btn-secondary:hover { background: #fff7f0; }
  .feedback {
    margin-top: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    min-height: 1.4em;
  }
  .feedback.ok { color: var(--ok); }
  .feedback.bad { color: var(--bad); }
  .explain {
    margin-top: 18px;
    background: #fffbeb;
    border-left: 5px solid #f59e0b;
    border-radius: 10px;
    padding: 14px 16px;
    line-height: 1.7;
    display: none;
  }
  .explain.show { display: block; }
  .explain .label { font-weight: 700; color: var(--accent-dark); }
  .explain .ans { font-size: 1.15rem; margin-bottom: 8px; }
  .hint-note {
    margin-top: 20px;
    color: var(--muted);
    font-size: 0.82rem;
    text-align: center;
  }

  /* 進度列 */
  .progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .progress-dots { display: flex; gap: 6px; flex: 1; }
  .dot {
    flex: 1;
    height: 8px;
    border-radius: 999px;
    background: #f1e2d3;
    transition: background 0.2s;
  }
  .dot.ok { background: var(--ok); }
  .dot.bad { background: var(--bad); }
  .dot.current { background: var(--accent); }
  .progress-text { font-size: 0.85rem; color: var(--muted); font-weight: 700; white-space: nowrap; }

  /* 結算頁 */
  .result { text-align: center; }
  .result h2 { font-size: 1.6rem; margin: 4px 0 6px; color: var(--accent-dark); }
  .result .score {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    margin: 10px 0;
  }
  .result .score small { font-size: 1.4rem; color: var(--muted); font-weight: 700; }
  .result .msg { font-size: 1.1rem; margin: 6px 0 20px; }
  .result-list { text-align: left; margin: 18px 0 8px; }
  .result-item {
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    line-height: 1.6;
    font-size: 0.95rem;
  }
  .result-item.ok  { background: #ecfdf5; border-left: 5px solid var(--ok); }
  .result-item.bad { background: #fef2f2; border-left: 5px solid var(--bad); }
  .result-item .ri-q { font-weight: 600; }
  .result-item .ri-detail { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }
  .result-item .ri-detail b { color: var(--ink); }
  .btn-big {
    background: var(--accent);
    color: #fff;
    width: 100%;
    font-size: 1.15rem;
    padding: 16px;
    margin-top: 8px;
  }
  .btn-big:hover { background: var(--accent-dark); }

  /* 慶祝動畫（仿 aiaili_math） */
  #celebrate {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    background: rgba(255,247,237,0.6); overflow: hidden; pointer-events: none;
  }
  #celebrate.show { display: flex; }
  #celebrate.fade { animation: cele-fade .5s ease-in forwards; }
  @keyframes cele-fade { from { opacity: 1; } to { opacity: 0; } }
  .cele-img {
    width: 80%; max-width: 30rem; object-fit: contain;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,.12));
    animation: cele-pop .5s cubic-bezier(0.34,1.56,0.64,1) both,
               cele-bounce 1.2s ease-in-out 0.5s infinite;
  }
  @keyframes cele-pop {
    0%   { transform: scale(0.2) rotate(-12deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(6deg);  opacity: 1; }
    100% { transform: scale(1)   rotate(0);      opacity: 1; }
  }
  @keyframes cele-bounce {
    0%,100% { transform: scale(1)    rotate(0deg); }
    25%     { transform: scale(1.08) rotate(-2.5deg); }
    50%     { transform: scale(0.97) rotate(0deg); }
    75%     { transform: scale(1.08) rotate(2.5deg); }
  }
  .cele-sparkles { position: absolute; inset: 0; pointer-events: none; }
  .cele-sparkles span { position: absolute; font-size: 2.2rem; animation: cele-sparkle 2.2s ease-out infinite; }
  @keyframes cele-sparkle {
    0%   { transform: scale(0.4) translateY(15px); opacity: 0; }
    25%  { transform: scale(1.2) translateY(0);    opacity: 1; }
    80%  { transform: scale(1)   translateY(-18px); opacity: 1; }
    100% { transform: scale(0.6) translateY(-36px); opacity: 0; }
  }
</style>
</head>
<body>
  <h1>🎯 我愛陷阱題</h1>
  <p class="subtitle">國小三年級・一關 8 題，全對就有慶祝畫面！</p>

  <!-- 作答卡 -->
  <div class="card" id="quizCard">
    <div class="progress">
      <div class="progress-dots" id="progressDots"></div>
      <span class="progress-text" id="progressText">第 1 / 8 題</span>
    </div>

    <span class="tag" id="tag">陷阱題</span>
    <p class="question" id="question">載入中…</p>

    <div class="answer-row">
      <input type="text" id="userAnswer" placeholder="在這裡輸入你的答案" autocomplete="off">
      <button class="btn-check" id="checkBtn">對答案</button>
    </div>
    <div class="feedback" id="feedback"></div>

    <div class="explain" id="explain">
      <div class="ans"><span class="label">✅ 正確答案：</span><span id="answerText"></span></div>
      <div><span class="label">⚠️ 陷阱在哪：</span><span id="trapText"></span></div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" id="showBtn">看答案 / 解析</button>
      <button class="btn-secondary" id="nextBtn">下一題 ➜</button>
    </div>

    <p class="hint-note">提示：答案只要填數字就好（例如「8」或「500」）。跑步題請照「誰比較快，快幾秒」的方式想。</p>
  </div>

  <!-- 結算卡 -->
  <div class="card result" id="resultCard" style="display:none;">
    <h2 id="resultTitle">這一關結束囉！</h2>
    <div class="score"><span id="resultScore">0</span><small> / 8 題答對</small></div>
    <p class="msg" id="resultMsg"></p>
    <div class="result-list" id="resultList"></div>
    <button class="btn-big" id="againBtn">再玩一關 ➜</button>
  </div>

<!-- 慶祝 -->
<div id="celebrate">
  <div class="cele-sparkles" id="celeSparkles"></div>
  <img class="cele-img" src="assets/images/celebration.png" alt="慶祝" draggable="false" />
</div>

<script>
// ====== 題目產生器 ======
// 三大類陷阱：①語意、④多餘／不足條件、⑤單位（同 grade3_trap_questions.md 的分類）
const randInt = (min, max) => min + Math.floor(Math.random() * (max - min + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const NAMES = ['小明','小華','小美','小傑','小安','阿寶','小雲','小柏'];
const CAT_SEMANTIC = '① 語意陷阱';
const CAT_CONDITION = '④ 多餘／不足條件';
const CAT_UNIT = '⑤ 單位陷阱';
const CAT_WORD = '⑥ 動腦應用題';

function twoNames() {
  const a = pick(NAMES);
  let b = pick(NAMES);
  while (b === a) b = pick(NAMES);
  return [a, b];
}

// ---------- ① 語意陷阱 ----------

// ①-1：「比…多／比…少」方向搞反
function templateCompareSave() {
  const [nameA, nameB] = twoNames();
  const base = randInt(15, 45) * 10;
  const diff = randInt(3, 12) * 10;
  if (base - diff <= 0) return null;
  if (Math.random() < 0.5) {
    return {
      category: CAT_SEMANTIC,
      question: `${nameA}存了 ${base} 元，${nameA}比${nameB}多存 ${diff} 元。請問${nameB}存了多少元？`,
      answerNum: base - diff,
      answerText: `${base - diff} 元`,
      trap: `看到「多」不能直覺就加！多的是${nameA}，表示${nameB}比較少，要用 ${base}−${diff}＝${base - diff}。`,
    };
  }
  return {
    category: CAT_SEMANTIC,
    question: `${nameA}存了 ${base} 元，${nameA}比${nameB}少存 ${diff} 元。請問${nameB}存了多少元？`,
    answerNum: base + diff,
    answerText: `${base + diff} 元`,
    trap: `看到「少」不能直覺就減！少的是${nameA}，表示${nameB}比較多，要用 ${base}＋${diff}＝${base + diff}。`,
  };
}

// ①-2：排隊——從前數第 a、從後數第 b，總共幾人（自己被數兩次）
function templateQueueTotal() {
  const name = pick(NAMES);
  const front = randInt(4, 12);
  const back = randInt(3, 10);
  const total = front + back - 1;
  return {
    category: CAT_SEMANTIC,
    question: `${name}在排隊買票，從前面數${name}是第 ${front} 個，從後面數是第 ${back} 個。這一排總共有幾個人？`,
    answerNum: total,
    answerText: `${total} 人`,
    trap: `直接 ${front}＋${back}＝${front + back} 是錯的！${name}自己被數了兩次，要再減 1：${front}＋${back}−1＝${total}。`,
  };
}

// ①-3：排隊反向——總共 N 人，從前面數第 a，問從後面數第幾
function templateQueuePosition() {
  const name = pick(NAMES);
  const total = randInt(12, 25);
  const front = randInt(3, total - 2);
  const pos = total - front + 1;
  return {
    category: CAT_SEMANTIC,
    question: `一排總共有 ${total} 個人，${name}從前面數是第 ${front} 個。請問${name}從後面數是第幾個？`,
    answerNum: pos,
    answerText: `第 ${pos} 個`,
    trap: `不是 ${total}−${front}＝${total - front}！${name}自己也要算進去，${total}−${front}＋1＝${pos}。`,
  };
}

// ①-4：「增加到」vs「增加了」／「減少到」vs「減少了」
function templateIncreaseTo() {
  const animal = pick(['雞', '鴨', '兔子', '羊']);
  if (Math.random() < 0.5) {
    const before = randInt(15, 60);
    const added = randInt(8, 30);
    const after = before + added;
    return {
      category: CAT_SEMANTIC,
      question: `農場裡原來有 ${before} 隻${animal}，後來增加到 ${after} 隻。請問增加了幾隻？`,
      answerNum: added,
      answerText: `${added} 隻`,
      trap: `「增加到 ${after} 隻」是說現在總共 ${after} 隻，不是增加了 ${after} 隻！增加的是 ${after}−${before}＝${added} 隻。`,
    };
  }
  const after = randInt(15, 50);
  const dec = randInt(8, 30);
  const before = after + dec;
  return {
    category: CAT_SEMANTIC,
    question: `農場裡原來有 ${before} 隻${animal}，後來減少到 ${after} 隻。請問減少了幾隻？`,
    answerNum: dec,
    answerText: `${dec} 隻`,
    trap: `「減少到 ${after} 隻」是說剩下 ${after} 隻，不是減少了 ${after} 隻！減少的是 ${before}−${after}＝${dec} 隻。`,
  };
}

// ---------- ④ 多餘／不足條件 ----------

// ④-1：文具店——塞入沒買的東西的價錢（多餘條件）
function templateShopExtra() {
  const name = pick(NAMES);
  const pPencil = randInt(5, 9);
  const pEraser = randInt(10, 15);
  const pPen = randInt(12, 18);
  const items = [['鉛筆', '枝', pPencil], ['橡皮擦', '個', pEraser], ['原子筆', '枝', pPen]];
  const [itemName, unit, price] = items[randInt(0, 2)];
  const count = randInt(2, 5);
  const cost = count * price;
  if (cost >= 100) return null;
  const change = 100 - cost;
  return {
    category: CAT_CONDITION,
    question: `文具店裡鉛筆一枝 ${pPencil} 元、橡皮擦一個 ${pEraser} 元、原子筆一枝 ${pPen} 元。${name}買了 ${count} ${unit}${itemName}，付了 100 元，應該找回多少元？`,
    answerNum: change,
    answerText: `${change} 元`,
    trap: `${name}只買了${itemName}，另外兩種的價錢是多餘條件，不要用！${count}×${price}＝${cost}，100−${cost}＝${change}。`,
  };
}

// ④-2：遊覽車——別漏算老師＋餘數要「進位」
function templateBusCeil() {
  const cap = pick([40, 45, 50]);
  const boys = randInt(50, 80);
  const girls = randInt(40, 70);
  const teachers = randInt(4, 8);
  const total = boys + girls + teachers;
  if (total % cap === 0) return null;
  const cars = Math.floor(total / cap) + 1;
  return {
    category: CAT_CONDITION,
    question: `一輛遊覽車可以載 ${cap} 人。三年級有男生 ${boys} 人、女生 ${girls} 人，還有 ${teachers} 位老師。全部的人都要坐遊覽車，至少需要幾輛車？`,
    answerNum: cars,
    answerText: `${cars} 輛`,
    trap: `兩層陷阱：(1) 別漏算老師，總共 ${boys}＋${girls}＋${teachers}＝${total} 人；(2) ${total}÷${cap}＝${Math.floor(total / cap)} 輛餘 ${total % cap} 人，剩下的人也要坐車，所以要進位成 ${cars} 輛。`,
  };
}

// ④-3：裝禮盒——餘數要「捨去」（和坐車相反）
function templateBoxFloor() {
  const per = pick([6, 8, 9, 12]);
  const total = randInt(40, 95);
  if (total % per === 0) return null;
  const boxes = Math.floor(total / per);
  const thing = pick(['蘋果', '橘子', '雞蛋', '餅乾']);
  return {
    category: CAT_CONDITION,
    question: `一個禮盒要裝滿 ${per} 個${thing}才能算一盒。現在有 ${total} 個${thing}，最多可以裝滿幾盒？`,
    answerNum: boxes,
    answerText: `${boxes} 盒`,
    trap: `${total}÷${per}＝${boxes} 盒餘 ${total % per} 個，剩下的裝不滿一盒，不能算！這題餘數要「捨去」，和坐遊覽車要「進位」剛好相反。`,
  };
}

// ④-4：分糖果——年齡是多餘條件＋人數要數清楚（含自己）
function templateCandyExtra() {
  const name = pick(NAMES);
  const bros = randInt(1, 3);
  const sis = randInt(1, 2);
  const people = 1 + bros + sis;
  const per = randInt(6, 12);
  const candies = people * per;
  const age = randInt(8, 10);
  return {
    category: CAT_CONDITION,
    question: `${name}今年 ${age} 歲，他有 ${bros} 個哥哥、${sis} 個姐姐。媽媽買了 ${candies} 顆糖果，要平分給${name}和他的兄弟姐妹（爸爸媽媽不吃）。每個人分到幾顆？`,
    answerNum: per,
    answerText: `每人 ${per} 顆`,
    trap: `「${age} 歲」是多餘條件，用不到！分糖的人數要數清楚：${name}自己＋${bros} 個哥哥＋${sis} 個姐姐＝${people} 人，${candies}÷${people}＝${per} 顆。`,
  };
}

// ---------- ⑤ 單位陷阱 ----------

// ⑤-1：公尺 ↔ 公分
function templateRibbon() {
  const meters = randInt(2, 6);
  const perCm = pick([20, 25, 40, 50]);
  const totalCm = meters * 100;
  if (totalCm % perCm !== 0) return null;
  const answer = totalCm / perCm;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `一條緞帶長 ${meters} 公尺，${name}做一個蝴蝶結要用 ${perCm} 公分。這條緞帶最多可以做幾個蝴蝶結？`,
    answerNum: answer,
    answerText: `${answer} 個`,
    trap: `${meters} 公尺要先換成 ${totalCm} 公分，不能直接用 ${meters}÷${perCm}。`,
  };
}

// ⑤-2：公升 ↔ 毫升
function templateJuice() {
  const perBottle = pick([250, 500]);
  const bottles = randInt(3, 6);
  const totalMl = perBottle * bottles;
  const drinkL = randInt(1, Math.floor(totalMl / 1000));
  const answer = totalMl - drinkL * 1000;
  if (answer <= 0) return null;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `一瓶果汁 ${perBottle} 毫升。${name}家買了 ${bottles} 瓶，全家喝掉 ${drinkL} 公升，還剩下多少毫升？`,
    answerNum: answer,
    answerText: `${answer} 毫升`,
    trap: `喝掉的量用「公升」，要換成 ${drinkL * 1000} 毫升再減；剩下用「毫升」回答。`,
  };
}

// ⑤-3：分 ↔ 秒（＋時間短才是快）
function templateRace() {
  const [nameA, nameB] = twoNames();
  const minA = randInt(1, 2);
  const secA = randInt(5, 55);
  const totalA = minA * 60 + secA;
  const totalB = randInt(70, 175);
  if (totalB === totalA) return null;
  const faster = totalA < totalB ? nameA : nameB;
  const diff = Math.abs(totalA - totalB);
  return {
    category: CAT_UNIT,
    question: `運動會上，${nameA}跑了 ${minA} 分 ${secA} 秒，${nameB}跑了 ${totalB} 秒。誰跑得比較快？快了幾秒？`,
    answerNum: diff,                       // 對答案時只比對「快幾秒」的數字
    answerText: `${faster}比較快，快 ${diff} 秒`,
    trap: `${minA} 分 ${secA} 秒要換成 ${totalA} 秒再比；時間短的才是跑得快。`,
  };
}

// ⑤-4：公斤 ↔ 公克
function templateFlour() {
  const kg = randInt(1, 3);
  const used = randInt(2, kg * 10 - 1) * 100;
  const left = kg * 1000 - used;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `一包麵粉重 ${kg} 公斤，${name}的媽媽做蛋糕用掉 ${used} 公克，還剩下多少公克？`,
    answerNum: left,
    answerText: `${left} 公克`,
    trap: `${kg} 公斤要先換成 ${kg * 1000} 公克再減：${kg * 1000}−${used}＝${left}，不能直接拿 ${kg} 去減。`,
  };
}

// ⑤-5：公里 ↔ 公尺
function templateWalk() {
  const km = randInt(1, 3);
  const walked = randInt(3, km * 10 - 1) * 100;
  const left = km * 1000 - walked;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `${name}家到學校有 ${km} 公里，${name}已經走了 ${walked} 公尺，還要再走多少公尺才會到？`,
    answerNum: left,
    answerText: `${left} 公尺`,
    trap: `${km} 公里＝${km * 1000} 公尺，要先換算再減：${km * 1000}−${walked}＝${left}。`,
  };
}

// ⑤-6：時 ↔ 分
function templateMovie() {
  const hours = randInt(1, 2);
  const totalMin = hours * 60;
  const played = randInt(Math.floor(totalMin * 0.4), totalMin - 10);
  const left = totalMin - played;
  return {
    category: CAT_UNIT,
    question: `一部電影全長 ${hours} 小時，已經播了 ${played} 分鐘，還剩下幾分鐘才播完？`,
    answerNum: left,
    answerText: `${left} 分鐘`,
    trap: `${hours} 小時＝${totalMin} 分鐘，要先換算：${totalMin}−${played}＝${left} 分鐘。`,
  };
}

// ---------- ⑥ 動腦應用題（不一定有陷阱，但要讀懂題意、想一下才會做） ----------

// ⑥-1：年齡差不變——今年差幾歲，幾年後還是差幾歲
function templateAgeGap() {
  const [nameA, nameB] = twoNames();
  const gap = randInt(3, 8);
  const ageA = randInt(9, 13);
  const ageB = ageA + gap;
  const years = randInt(3, 8);
  return {
    category: CAT_WORD,
    question: `今年${nameB}比${nameA}大 ${gap} 歲。再過 ${years} 年，${nameB}會比${nameA}大幾歲？`,
    answerNum: gap,
    answerText: `${gap} 歲`,
    trap: `兩個人每年都各長 1 歲，年齡差永遠不變，所以還是 ${gap} 歲，不是 ${gap}＋${years}。`,
  };
}

// ⑥-2：雞兔同籠（頭腳問題，三年級用湊的）
function templateChickenRabbit() {
  const rabbits = randInt(2, 6);
  const chickens = randInt(2, 8);
  const heads = rabbits + chickens;
  const legs = rabbits * 4 + chickens * 2;
  return {
    category: CAT_WORD,
    question: `農場裡有雞和兔子，數頭一共 ${heads} 個，數腳一共 ${legs} 隻。請問有幾隻兔子？`,
    answerNum: rabbits,
    answerText: `${rabbits} 隻兔子`,
    trap: `先假設 ${heads} 隻全是雞，共 ${heads * 2} 隻腳；還差 ${legs - heads * 2} 隻腳，每把一隻雞換成兔子多 2 隻腳，${legs - heads * 2}÷2＝${rabbits} 隻兔子。`,
  };
}

// ⑥-3：過河問題——每次載幾個，要幾趟
function templateBoatTrips() {
  const perTrip = randInt(3, 6);
  const trips = randInt(3, 6);
  const extra = randInt(1, perTrip - 1);
  const total = perTrip * (trips - 1) + extra;
  return {
    category: CAT_WORD,
    question: `一艘小船每次最多載 ${perTrip} 個人過河。有 ${total} 個人要過河，至少要載幾趟才能全部過去？`,
    answerNum: trips,
    answerText: `${trips} 趟`,
    trap: `${total}÷${perTrip}＝${trips - 1} 趟餘 ${extra} 人，剩下的人還要再一趟，所以要進位成 ${trips} 趟。`,
  };
}

// ⑥-4：先買再送——中間量問題（兩步驟）
function templateGiveAway() {
  const name = pick(NAMES);
  const packs = randInt(3, 6);
  const perPack = pick([4, 5, 6, 8]);
  const gave = randInt(2, 6);
  const total = packs * perPack;
  const left = total - gave;
  const thing = pick(['貼紙', '彈珠', '糖果', '卡片']);
  return {
    category: CAT_WORD,
    question: `${name}買了 ${packs} 包${thing}，每包 ${perPack} 個，送給同學 ${gave} 個之後，自己還剩幾個？`,
    answerNum: left,
    answerText: `${left} 個`,
    trap: `要先算出總共有幾個（${packs}×${perPack}＝${total}），再減掉送出的 ${gave} 個：${total}−${gave}＝${left}。`,
  };
}

// ⑥-5：平分後每人再拿——兩步驟
function templateSharePlus() {
  const people = randInt(3, 6);
  const per = randInt(4, 9);
  const total = people * per;
  const thing = pick(['餅乾', '水餃', '雞塊', '草莓']);
  const name = pick(NAMES);
  return {
    category: CAT_WORD,
    question: `盤子裡有 ${total} 個${thing}，${name}和另外 ${people - 1} 個朋友要平分，每個人可以分到幾個？`,
    answerNum: per,
    answerText: `${per} 個`,
    trap: `分的人數要把${name}自己也算進去，一共 ${people} 人（不是 ${people - 1} 人），${total}÷${people}＝${per} 個。`,
  };
}

// ⑥-6：倍數比較——是別人的幾倍
function templateTimesAs() {
  const [nameA, nameB] = twoNames();
  const times = randInt(2, 5);
  const b = randInt(4, 12);
  const a = b * times;
  const thing = pick(['張貼紙', '顆彈珠', '本書', '元']);
  return {
    category: CAT_WORD,
    question: `${nameA}有 ${a} ${thing}，${nameB}有 ${b} ${thing}。${nameA}的數量是${nameB}的幾倍？`,
    answerNum: times,
    answerText: `${times} 倍`,
    trap: `「是幾倍」要用大的除以小的：${a}÷${b}＝${times} 倍。`,
  };
}

// ⑥-7：每天固定量的累加，再比對總量夠不夠
function templateReadDays() {
  const name = pick(NAMES);
  const perDay = randInt(6, 15);
  const days = randInt(4, 7);
  const total = perDay * days;
  const bookPages = total + randInt(1, 20);
  const leftPages = bookPages - total;
  return {
    category: CAT_WORD,
    question: `${name}每天讀 ${perDay} 頁故事書，連續讀了 ${days} 天。這本書一共有 ${bookPages} 頁，他還有幾頁沒讀完？`,
    answerNum: leftPages,
    answerText: `還有 ${leftPages} 頁`,
    trap: `先算讀了幾頁：${perDay}×${days}＝${total} 頁；再用全書減掉：${bookPages}−${total}＝${leftPages} 頁。`,
  };
}

// ⑥-8：找規律填下一個（等差）
function templatePattern() {
  const start = randInt(2, 9);
  const step = randInt(2, 6);
  const seq = [start, start + step, start + 2 * step, start + 3 * step];
  const next = start + 4 * step;
  return {
    category: CAT_WORD,
    question: `照規律排下去：${seq.join('、')}、□。請問□是多少？`,
    answerNum: next,
    answerText: `${next}`,
    trap: `每個數字都比前一個多 ${step}（${seq[1]}−${seq[0]}＝${step}），所以□＝${seq[3]}＋${step}＝${next}。`,
  };
}

// ⑥-9：找規律填下一個（等比／翻倍）
function templatePatternMul() {
  const start = pick([1, 2, 3]);
  const seq = [start, start * 2, start * 4, start * 8];
  const next = start * 16;
  return {
    category: CAT_WORD,
    question: `照規律排下去：${seq.join('、')}、□。請問□是多少？`,
    answerNum: next,
    answerText: `${next}`,
    trap: `每個數字都是前一個的 2 倍（${seq[1]}÷${seq[0]}＝2），所以□＝${seq[3]}×2＝${next}。`,
  };
}

// ⑥-10：逆推——原本有多少（先加回再減／先加後問原本）
function templateReverse() {
  const name = pick(NAMES);
  const spent = randInt(15, 60);
  const left = randInt(10, 40);
  const original = spent + left;
  return {
    category: CAT_WORD,
    question: `${name}去買文具，花掉 ${spent} 元後還剩下 ${left} 元。請問${name}原本有多少錢？`,
    answerNum: original,
    answerText: `${original} 元`,
    trap: `原本的錢＝花掉的＋剩下的，要用加法把花掉的加回去：${spent}＋${left}＝${original}。`,
  };
}

// ⑥-11：週 ↔ 天
function templateWeeks() {
  const weeks = randInt(2, 6);
  const extraDays = randInt(1, 6);
  const total = weeks * 7 + extraDays;
  return {
    category: CAT_WORD,
    question: `暑假作業要寫 ${total} 天。${total} 天等於 ${weeks} 個星期又幾天？`,
    answerNum: extraDays,
    answerText: `${weeks} 個星期又 ${extraDays} 天`,
    trap: `1 個星期＝7 天。${total}÷7＝${weeks} 星期餘 ${extraDays} 天，餘數就是多出來的天數。`,
  };
}

// ⑥-12：時刻計算——經過多久（同一天，時＋分）
function templateElapsed() {
  const startH = randInt(1, 6);
  const durH = randInt(1, 3);
  const durM = pick([10, 15, 20, 30, 40, 45]);
  const endMinTotal = startH * 60 + durH * 60 + durM;
  const endH = Math.floor(endMinTotal / 60);
  const endM = endMinTotal % 60;
  if (endH > 11) return null;
  return {
    category: CAT_WORD,
    question: `電影從 ${startH} 點開始，演到 ${endH} 點 ${endM === 0 ? '整' : endM + ' 分'} 結束。這部電影一共演了幾分鐘？`,
    answerNum: durH * 60 + durM,
    answerText: `${durH * 60 + durM} 分鐘（${durH} 小時 ${durM} 分）`,
    trap: `從 ${startH} 點到 ${endH} 點是 ${durH} 小時＝${durH * 60} 分，再加上 ${durM} 分，共 ${durH * 60 + durM} 分鐘。`,
  };
}

const TEMPLATES = [
  // ① 語意陷阱
  templateCompareSave, templateQueueTotal, templateQueuePosition, templateIncreaseTo,
  // ④ 多餘／不足條件
  templateShopExtra, templateBusCeil, templateBoxFloor, templateCandyExtra,
  // ⑤ 單位陷阱
  templateRibbon, templateJuice, templateRace, templateFlour, templateWalk, templateMovie,
  // ⑥ 動腦應用題
  templateAgeGap, templateChickenRabbit, templateBoatTrips, templateGiveAway,
  templateSharePlus, templateTimesAs, templateReadDays, templatePattern,
  templatePatternMul, templateReverse, templateWeeks, templateElapsed,
];

function genOne() {
  for (let i = 0; i < 50; i++) {
    const q = pick(TEMPLATES)();
    if (q) return q;
  }
  throw new Error('抽不到合格題目');
}

// ====== 音效（沿用 aiaili_math 的預熱池 + iOS 解鎖機制） ======
const SOUND_FILES = { ding: 'ding.mp3', eoh: 'eoh.mp3', cheer: 'cheer.mp3' };
const SOUND_BASE = 'assets/sounds/';
const POOL_SIZE = 2;
const pools = { ding: [], eoh: [], cheer: [] };
function makeElement(name) {
  const el = new Audio(SOUND_BASE + SOUND_FILES[name]);
  el.preload = 'auto'; el.load();
  return el;
}
for (const name of Object.keys(SOUND_FILES))
  for (let i = 0; i < POOL_SIZE; i++) pools[name].push(makeElement(name));

let audioUnlocked = false, unlockInFlight = false;
// iOS 要「在使用者手勢內真的播一次聲音（不能靜音）」才會解鎖 audio channel。
function unlockSounds() {
  if (audioUnlocked || unlockInFlight) return;
  unlockInFlight = true;
  const dummy = new Audio(SOUND_BASE + SOUND_FILES.ding);
  dummy.play()
    .then(() => { audioUnlocked = true; unlockInFlight = false; })
    .catch(() => { unlockInFlight = false; });
}
const uh = () => unlockSounds();
document.addEventListener('touchstart', uh, { capture: true, passive: true });
document.addEventListener('touchend', uh, { capture: true, passive: true });
document.addEventListener('mousedown', uh, { capture: true });
document.addEventListener('click', uh, { capture: true });
function playSound(name) {
  const pool = pools[name];
  let el = pool.find((e) => e.paused || e.ended);
  if (!el) el = makeElement(name);
  else if (el.currentTime !== 0) el.currentTime = 0;
  el.play().catch(() => {});
}

// ====== 慶祝畫面（仿 aiaili_math） ======
const CELE_EMOJIS = ['⭐','✨','🎉','🌟','🎊','🌸'];
const CELE_DURATION = 3600;
function renderCeleSparkles() {
  const el = $('celeSparkles');
  el.innerHTML = '';
  const spots = [
    [10,16],[86,20],[20,72],[80,76],[50,10],[8,46],
    [92,50],[42,88],[66,90],[30,30],[72,34],[16,60],
  ];
  spots.forEach(([left, top], i) => {
    const s = document.createElement('span');
    s.textContent = CELE_EMOJIS[i % CELE_EMOJIS.length];
    s.style.left = left + '%';
    s.style.top = top + '%';
    s.style.animationDelay = (i * 0.12 % 1.2) + 's';
    el.appendChild(s);
  });
}
function playCelebration() {
  playSound('cheer');
  renderCeleSparkles();
  const celebrate = $('celebrate');
  celebrate.classList.remove('fade');
  celebrate.classList.add('show');
  const img = celebrate.querySelector('.cele-img');
  if (img) { img.style.animation = 'none'; void img.offsetWidth; img.style.animation = ''; }
  setTimeout(() => celebrate.classList.add('fade'), CELE_DURATION - 500);
  setTimeout(() => celebrate.classList.remove('show', 'fade'), CELE_DURATION);
}

// ====== 關卡邏輯：一關 8 題 ======
const SET_SIZE = 8;
let current = null;      // 這一題
let idx = 0;             // 目前第幾題（0-based）
let answered = false;    // 這一題是否已對過答案
let results = [];        // 每題結果：{ q, user, correct }

function $(id) { return document.getElementById(id); }

function renderProgress() {
  const dots = $('progressDots');
  dots.innerHTML = '';
  for (let i = 0; i < SET_SIZE; i++) {
    const d = document.createElement('span');
    d.className = 'dot';
    if (i < results.length) d.classList.add(results[i].correct ? 'ok' : 'bad');
    else if (i === idx) d.classList.add('current');
    dots.appendChild(d);
  }
  $('progressText').textContent = `第 ${idx + 1} / ${SET_SIZE} 題`;
}

function loadQuestion() {
  current = genOne();
  answered = false;
  $('tag').textContent = current.category;
  $('question').textContent = current.question;
  $('userAnswer').value = '';
  $('userAnswer').disabled = false;
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('explain').classList.remove('show');
  $('checkBtn').disabled = false;
  $('nextBtn').textContent = (idx === SET_SIZE - 1) ? '看成績 ➜' : '下一題 ➜';
  renderProgress();
  $('userAnswer').focus();
}

function checkAnswer() {
  if (answered) return;
  const raw = $('userAnswer').value.trim();
  if (raw === '') {
    $('feedback').textContent = '先輸入一個答案再對答案喔～';
    $('feedback').className = 'feedback bad';
    return;
  }
  // 從輸入中抓出數字（容許孩子多打單位，例如 "8個" "500 毫升"）
  const num = parseInt(raw.replace(/[^0-9]/g, ''), 10);
  const correct = num === current.answerNum;
  answered = true;
  $('userAnswer').disabled = true;
  $('checkBtn').disabled = true;
  results.push({ q: current, user: raw, correct });
  if (correct) {
    playSound('ding');
    $('feedback').textContent = '🎉 答對了！你有看清楚陷阱！';
    $('feedback').className = 'feedback ok';
  } else {
    playSound('eoh');
    $('feedback').textContent = '答錯了～看看下面的解析。';
    $('feedback').className = 'feedback bad';
    showExplain();
  }
  renderProgress();
}

function showExplain() {
  $('answerText').textContent = current.answerText;
  $('trapText').textContent = current.trap;
  $('explain').classList.add('show');
}

function nextStep() {
  if (!answered) {           // 還沒對答案就按「下一題」→ 先幫他對答案並顯示解析，不直接跳過
    checkAnswer();
    return;                  // 對完答案先停一下讓孩子看解析，再按一次才前進到下一題
  }
  idx++;
  if (idx >= SET_SIZE) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  const correctCount = results.filter(r => r.correct).length;
  const allRight = correctCount === SET_SIZE;

  $('quizCard').style.display = 'none';
  $('resultCard').style.display = '';

  $('resultScore').textContent = correctCount;
  $('resultTitle').textContent = allRight ? '🏆 全部答對，太厲害了！' : '這一關結束囉！';
  if (allRight) {
    $('resultMsg').textContent = '八題全對，完全沒有掉進陷阱！';
  } else if (correctCount >= 6) {
    $('resultMsg').textContent = '很不錯！再檢查一下錯的題目就更棒了。';
  } else if (correctCount >= 3) {
    $('resultMsg').textContent = '繼續加油！看看下面錯在哪裡。';
  } else {
    $('resultMsg').textContent = '別灰心，先看懂下面的解析再挑戰一次！';
  }

  const list = $('resultList');
  list.innerHTML = '';
  results.forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'result-item ' + (r.correct ? 'ok' : 'bad');
    const mark = r.correct ? '✅' : '❌';
    let html = `<div class="ri-q">${mark} 第 ${i + 1} 題：${r.q.question}</div>`;
    if (!r.correct) {
      html += `<div class="ri-detail">你的答案：${r.user}　→　正確答案：<b>${r.q.answerText}</b><br>⚠️ ${r.q.trap}</div>`;
    }
    item.innerHTML = html;
    list.appendChild(item);
  });

  if (allRight) setTimeout(playCelebration, 300);
}

function startSet() {
  idx = 0;
  results = [];
  $('resultCard').style.display = 'none';
  $('quizCard').style.display = '';
  loadQuestion();
}

$('checkBtn').addEventListener('click', checkAnswer);
$('showBtn').addEventListener('click', showExplain);
$('nextBtn').addEventListener('click', nextStep);
$('againBtn').addEventListener('click', startSet);
$('userAnswer').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { answered ? nextStep() : checkAnswer(); }
});

// 預載慶祝圖
(function preloadCele(){ const im = new Image(); im.src = 'assets/images/celebration.png'; })();
startSet();
</script>
