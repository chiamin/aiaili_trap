<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我愛陷阱題</title>
<style>
  :root {
    --bg: #fff7ed;
    --card: #ffffff;
    --accent: #f97316;
    --accent-dark: #ea580c;
    --ok: #16a34a;
    --bad: #dc2626;
    --ink: #1f2937;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 60px;
  }
  h1 {
    font-size: 2rem;
    margin: 12px 0 4px;
    color: var(--accent-dark);
  }
  .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 0.95rem; }
  .card {
    background: var(--card);
    width: 100%;
    max-width: 560px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    padding: 28px 26px 30px;
  }
  .tag {
    display: inline-block;
    background: #fff1e6;
    color: var(--accent-dark);
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .question {
    font-size: 1.3rem;
    line-height: 1.7;
    margin: 0 0 22px;
    font-weight: 500;
  }
  /* 作答區：顯示框 + 數字鍵盤 */
  .answer-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 8px;
  }
  .answer-box {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 58px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    background: #fafafa;
    padding: 6px 14px;
  }
  .answer-box .val {
    font-size: 1.9rem;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .answer-box .val.empty { color: #c8c8c8; }
  .answer-box .val.filled { color: var(--ink); }
  .answer-box.answered { border-color: var(--accent); }
  .pad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    padding: 12px 18px;
    cursor: pointer;
    transition: transform 0.05s, background 0.15s;
  }
  button:active { transform: scale(0.97); }
  .pad button {
    font-size: 1.5rem;
    padding: 0;
    height: 3.2rem;
    background: #fff;
    color: var(--ink);
    border: 2px solid #eee;
    -webkit-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  .pad button:hover { border-color: var(--accent); }
  .pad button:active { background: #fff1e6; }
  .pad button:disabled { color: #c8c8c8; background: var(--bg); cursor: default; border-color: #eee; }
  .pad .del { color: var(--muted); font-size: 1.6rem; }
  .pad .send {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    font-size: 1.15rem;
  }
  .pad .send:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .pad .send:disabled { background: #f5cba9; border-color: #f5cba9; color: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .btn-secondary {
    background: #fff;
    color: var(--accent-dark);
    border: 2px solid var(--accent);
    flex: 1;
  }
  .btn-secondary:hover { background: #fff7f0; }
  .feedback {
    margin-top: 16px;
    font-size: 1.1rem;
    font-weight: 700;
    min-height: 1.4em;
  }
  .feedback.ok { color: var(--ok); }
  .feedback.bad { color: var(--bad); }
  .explain {
    margin-top: 18px;
    background: #fffbeb;
    border-left: 5px solid #f59e0b;
    border-radius: 10px;
    padding: 14px 16px;
    line-height: 1.7;
    display: none;
  }
  .explain.show { display: block; }
  .explain .label { font-weight: 700; color: var(--accent-dark); }
  .explain .ans { font-size: 1.15rem; margin-bottom: 8px; }
  .hint-note {
    margin-top: 20px;
    color: var(--muted);
    font-size: 0.82rem;
    text-align: center;
  }

  /* 進度列 */
  .progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .progress-dots { display: flex; gap: 6px; flex: 1; }
  .dot {
    flex: 1;
    height: 8px;
    border-radius: 999px;
    background: #f1e2d3;
    transition: background 0.2s;
  }
  .dot.ok { background: var(--ok); }
  .dot.bad { background: var(--bad); }
  .dot.current { background: var(--accent); }
  .progress-text { font-size: 0.85rem; color: var(--muted); font-weight: 700; white-space: nowrap; }

  /* 結算頁 */
  .result { text-align: center; }
  .result h2 { font-size: 1.6rem; margin: 4px 0 6px; color: var(--accent-dark); }
  .result .score {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    margin: 10px 0;
  }
  .result .score small { font-size: 1.4rem; color: var(--muted); font-weight: 700; }
  .result .msg { font-size: 1.1rem; margin: 6px 0 20px; }
  .result-list { text-align: left; margin: 18px 0 8px; }
  .result-item {
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    line-height: 1.6;
    font-size: 0.95rem;
  }
  .result-item.ok  { background: #ecfdf5; border-left: 5px solid var(--ok); }
  .result-item.bad { background: #fef2f2; border-left: 5px solid var(--bad); }
  .result-item .ri-q { font-weight: 600; }
  .result-item .ri-detail { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }
  .result-item .ri-detail b { color: var(--ink); }
  .btn-big {
    background: var(--accent);
    color: #fff;
    width: 100%;
    font-size: 1.15rem;
    padding: 16px;
    margin-top: 8px;
  }
  .btn-big:hover { background: var(--accent-dark); }

  /* 慶祝動畫（仿 aiaili_math） */
  #celebrate {
    position: fixed; inset: 0; z-index: 50;
    display: none; align-items: center; justify-content: center;
    background: rgba(255,247,237,0.6); overflow: hidden; pointer-events: none;
  }
  #celebrate.show { display: flex; }
  #celebrate.fade { animation: cele-fade .5s ease-in forwards; }
  @keyframes cele-fade { from { opacity: 1; } to { opacity: 0; } }
  .cele-img {
    width: 80%; max-width: 30rem; object-fit: contain;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,.12));
    animation: cele-pop .5s cubic-bezier(0.34,1.56,0.64,1) both,
               cele-bounce 1.2s ease-in-out 0.5s infinite;
  }
  @keyframes cele-pop {
    0%   { transform: scale(0.2) rotate(-12deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(6deg);  opacity: 1; }
    100% { transform: scale(1)   rotate(0);      opacity: 1; }
  }
  @keyframes cele-bounce {
    0%,100% { transform: scale(1)    rotate(0deg); }
    25%     { transform: scale(1.08) rotate(-2.5deg); }
    50%     { transform: scale(0.97) rotate(0deg); }
    75%     { transform: scale(1.08) rotate(2.5deg); }
  }
  .cele-sparkles { position: absolute; inset: 0; pointer-events: none; }
  .cele-sparkles span { position: absolute; font-size: 2.2rem; animation: cele-sparkle 2.2s ease-out infinite; }
  @keyframes cele-sparkle {
    0%   { transform: scale(0.4) translateY(15px); opacity: 0; }
    25%  { transform: scale(1.2) translateY(0);    opacity: 1; }
    80%  { transform: scale(1)   translateY(-18px); opacity: 1; }
    100% { transform: scale(0.6) translateY(-36px); opacity: 0; }
  }

  /* 寬螢幕／橫向（iPad 橫放等）：作答框與數字鍵盤改左右雙欄 */
  @media (min-width: 820px) and (orientation: landscape) {
    .card { max-width: 860px; padding: 30px 34px 32px; }
    /* 作答區改成左右兩欄：左＝作答框，右＝數字鍵盤 */
    .answer-row {
      flex-direction: row;
      align-items: stretch;
      gap: 24px;
    }
    /* 左欄：作答顯示框佔一份、直向置中放大 */
    .answer-box {
      flex: 1;
      min-height: 0;
      align-self: stretch;
    }
    .answer-box .val { font-size: 2.6rem; }
    /* 右欄：數字鍵盤佔一份，按鍵加高好按 */
    .pad {
      flex: 1;
      gap: 10px;
    }
    .pad button { height: 3.8rem; }
    /* 題目字體在寬螢幕略放大 */
    .question { font-size: 1.45rem; }
  }
</style>
</head>
<body>
  <h1>🎯 我愛陷阱題</h1>
  <p class="subtitle">國小三年級・答錯可以一直重試，答對 8 題就有慶祝畫面！</p>

  <!-- 作答卡 -->
  <div class="card" id="quizCard">
    <div class="progress">
      <div class="progress-dots" id="progressDots"></div>
      <span class="progress-text" id="progressText">答對 0 / 8</span>
    </div>

    <span class="tag" id="tag">陷阱題</span>
    <p class="question" id="question">載入中…</p>

    <div class="answer-row">
      <div class="answer-box" id="answerBox"><span class="val empty" id="answerVal">?</span></div>
      <div class="pad" id="pad">
        <button type="button" data-d="1">1</button>
        <button type="button" data-d="2">2</button>
        <button type="button" data-d="3">3</button>
        <button type="button" data-d="4">4</button>
        <button type="button" data-d="5">5</button>
        <button type="button" data-d="6">6</button>
        <button type="button" data-d="7">7</button>
        <button type="button" data-d="8">8</button>
        <button type="button" data-d="9">9</button>
        <button type="button" class="del" id="delBtn">⌫</button>
        <button type="button" data-d="0">0</button>
        <button type="button" class="send" id="checkBtn">對答案</button>
      </div>
    </div>
    <div class="feedback" id="feedback"></div>

    <div class="explain" id="explain">
      <div class="ans"><span class="label">✅ 正確答案：</span><span id="answerText"></span></div>
      <div><span class="label">⚠️ 陷阱在哪：</span><span id="trapText"></span></div>
    </div>

    <div class="btn-row">
      <button class="btn-secondary" id="showBtn">看答案 / 解析</button>
      <button class="btn-secondary" id="nextBtn">下一題 ➜</button>
    </div>

    <p class="hint-note">提示：用下面的鍵盤輸入數字答案（例如「8」或「500」）。分數題請照題目說的填「分子」或「分母」；星期題用 1～7 代表星期一～日。</p>
  </div>

<!-- 慶祝 -->
<div id="celebrate">
  <div class="cele-sparkles" id="celeSparkles"></div>
  <img class="cele-img" src="assets/images/celebration.png" alt="慶祝" draggable="false" />
</div>

<script>
// ====== 題目產生器 ======
// 三大類陷阱：①語意、④多餘／不足條件、⑤單位（同 grade3_trap_questions.md 的分類）
const randInt = (min, max) => min + Math.floor(Math.random() * (max - min + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const NAMES = ['小明','小華','小美','小傑','小安','阿寶','小雲','小柏'];
const CAT_SEMANTIC = '① 語意陷阱';
const CAT_CONDITION = '④ 多餘／不足條件';
const CAT_UNIT = '⑤ 單位陷阱';
const CAT_WORD = '⑥ 動腦應用題';
const CAT_FRAC = '⑦ 分數';
const CAT_DECIMAL = '⑧ 一位小數';
const CAT_AREA = '⑨ 面積／周長';
const CAT_DATE = '⑩ 日期';

function twoNames() {
  const a = pick(NAMES);
  let b = pick(NAMES);
  while (b === a) b = pick(NAMES);
  return [a, b];
}

// ---------- ① 語意陷阱 ----------

// ①-1：「比…多／比…少」方向搞反
function templateCompareSave() {
  const [nameA, nameB] = twoNames();
  const base = randInt(15, 45) * 10;
  const diff = randInt(3, 12) * 10;
  if (base - diff <= 0) return null;
  if (Math.random() < 0.5) {
    return {
      category: CAT_SEMANTIC,
      question: `${nameA}存了 ${base} 元，${nameA}比${nameB}多存 ${diff} 元。請問${nameB}存了多少元？`,
      answerNum: base - diff,
      answerText: `${base - diff} 元`,
      trap: `看到「多」不能直覺就加！多的是${nameA}，表示${nameB}比較少，要用 ${base}−${diff}＝${base - diff}。`,
    };
  }
  return {
    category: CAT_SEMANTIC,
    question: `${nameA}存了 ${base} 元，${nameA}比${nameB}少存 ${diff} 元。請問${nameB}存了多少元？`,
    answerNum: base + diff,
    answerText: `${base + diff} 元`,
    trap: `看到「少」不能直覺就減！少的是${nameA}，表示${nameB}比較多，要用 ${base}＋${diff}＝${base + diff}。`,
  };
}

// ①-2：排隊——從前數第 a、從後數第 b，總共幾人（自己被數兩次）
function templateQueueTotal() {
  const name = pick(NAMES);
  const front = randInt(4, 12);
  const back = randInt(3, 10);
  const total = front + back - 1;
  return {
    category: CAT_SEMANTIC,
    question: `${name}在排隊買票，從前面數${name}是第 ${front} 個，從後面數是第 ${back} 個。這一排總共有幾個人？`,
    answerNum: total,
    answerText: `${total} 人`,
    trap: `直接 ${front}＋${back}＝${front + back} 是錯的！${name}自己被數了兩次，要再減 1：${front}＋${back}−1＝${total}。`,
  };
}

// ①-3：排隊反向——總共 N 人，從前面數第 a，問從後面數第幾
function templateQueuePosition() {
  const name = pick(NAMES);
  const total = randInt(12, 25);
  const front = randInt(3, total - 2);
  const pos = total - front + 1;
  return {
    category: CAT_SEMANTIC,
    question: `一排總共有 ${total} 個人，${name}從前面數是第 ${front} 個。請問${name}從後面數是第幾個？`,
    answerNum: pos,
    answerText: `第 ${pos} 個`,
    trap: `不是 ${total}−${front}＝${total - front}！${name}自己也要算進去，${total}−${front}＋1＝${pos}。`,
  };
}

// ①-4：「增加到」vs「增加了」／「減少到」vs「減少了」
function templateIncreaseTo() {
  const animal = pick(['雞', '鴨', '兔子', '羊']);
  if (Math.random() < 0.5) {
    const before = randInt(15, 60);
    const added = randInt(8, 30);
    const after = before + added;
    return {
      category: CAT_SEMANTIC,
      question: `農場裡原來有 ${before} 隻${animal}，後來增加到 ${after} 隻。請問增加了幾隻？`,
      answerNum: added,
      answerText: `${added} 隻`,
      trap: `「增加到 ${after} 隻」是說現在總共 ${after} 隻，不是增加了 ${after} 隻！增加的是 ${after}−${before}＝${added} 隻。`,
    };
  }
  const after = randInt(15, 50);
  const dec = randInt(8, 30);
  const before = after + dec;
  return {
    category: CAT_SEMANTIC,
    question: `農場裡原來有 ${before} 隻${animal}，後來減少到 ${after} 隻。請問減少了幾隻？`,
    answerNum: dec,
    answerText: `${dec} 隻`,
    trap: `「減少到 ${after} 隻」是說剩下 ${after} 隻，不是減少了 ${after} 隻！減少的是 ${before}−${after}＝${dec} 隻。`,
  };
}

// ---------- ④ 多餘／不足條件 ----------

// ④-1：文具店——塞入沒買的東西的價錢（多餘條件）
function templateShopExtra() {
  const name = pick(NAMES);
  const pPencil = randInt(5, 9);
  const pEraser = randInt(10, 15);
  const pPen = randInt(12, 18);
  const items = [['鉛筆', '枝', pPencil], ['橡皮擦', '個', pEraser], ['原子筆', '枝', pPen]];
  const [itemName, unit, price] = items[randInt(0, 2)];
  const count = randInt(2, 5);
  const cost = count * price;
  if (cost >= 100) return null;
  const change = 100 - cost;
  return {
    category: CAT_CONDITION,
    question: `文具店裡鉛筆一枝 ${pPencil} 元、橡皮擦一個 ${pEraser} 元、原子筆一枝 ${pPen} 元。${name}買了 ${count} ${unit}${itemName}，付了 100 元，應該找回多少元？`,
    answerNum: change,
    answerText: `${change} 元`,
    trap: `${name}只買了${itemName}，另外兩種的價錢是多餘條件，不要用！${count}×${price}＝${cost}，100−${cost}＝${change}。`,
  };
}

// ④-2：遊覽車——別漏算老師＋餘數要「進位」
function templateBusCeil() {
  const cap = pick([40, 45, 50]);
  const boys = randInt(50, 80);
  const girls = randInt(40, 70);
  const teachers = randInt(4, 8);
  const total = boys + girls + teachers;
  if (total % cap === 0) return null;
  const cars = Math.floor(total / cap) + 1;
  return {
    category: CAT_CONDITION,
    question: `一輛遊覽車可以載 ${cap} 人。三年級有男生 ${boys} 人、女生 ${girls} 人，還有 ${teachers} 位老師。全部的人都要坐遊覽車，至少需要幾輛車？`,
    answerNum: cars,
    answerText: `${cars} 輛`,
    trap: `兩層陷阱：(1) 別漏算老師，總共 ${boys}＋${girls}＋${teachers}＝${total} 人；(2) ${total}÷${cap}＝${Math.floor(total / cap)} 輛餘 ${total % cap} 人，剩下的人也要坐車，所以要進位成 ${cars} 輛。`,
  };
}

// ④-3：裝禮盒——餘數要「捨去」（和坐車相反）
function templateBoxFloor() {
  const per = pick([6, 8, 9, 12]);
  const total = randInt(40, 95);
  if (total % per === 0) return null;
  const boxes = Math.floor(total / per);
  const thing = pick(['蘋果', '橘子', '雞蛋', '餅乾']);
  return {
    category: CAT_CONDITION,
    question: `一個禮盒要裝滿 ${per} 個${thing}才能算一盒。現在有 ${total} 個${thing}，最多可以裝滿幾盒？`,
    answerNum: boxes,
    answerText: `${boxes} 盒`,
    trap: `${total}÷${per}＝${boxes} 盒餘 ${total % per} 個，剩下的裝不滿一盒，不能算！這題餘數要「捨去」，和坐遊覽車要「進位」剛好相反。`,
  };
}

// ④-4：分糖果——年齡是多餘條件＋人數要數清楚（含自己）
function templateCandyExtra() {
  const name = pick(NAMES);
  const bros = randInt(1, 3);
  const sis = randInt(1, 2);
  const people = 1 + bros + sis;
  const per = randInt(6, 12);
  const candies = people * per;
  const age = randInt(8, 10);
  return {
    category: CAT_CONDITION,
    question: `${name}今年 ${age} 歲，他有 ${bros} 個哥哥、${sis} 個姐姐。媽媽買了 ${candies} 顆糖果，要平分給${name}和他的兄弟姐妹（爸爸媽媽不吃）。每個人分到幾顆？`,
    answerNum: per,
    answerText: `每人 ${per} 顆`,
    trap: `「${age} 歲」是多餘條件，用不到！分糖的人數要數清楚：${name}自己＋${bros} 個哥哥＋${sis} 個姐姐＝${people} 人，${candies}÷${people}＝${per} 顆。`,
  };
}

// ---------- ⑤ 單位陷阱 ----------

// ⑤-1：公尺 ↔ 公分
function templateRibbon() {
  const meters = randInt(2, 6);
  const perCm = pick([20, 25, 40, 50]);
  const totalCm = meters * 100;
  if (totalCm % perCm !== 0) return null;
  const answer = totalCm / perCm;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `一條緞帶長 ${meters} 公尺，${name}做一個蝴蝶結要用 ${perCm} 公分。這條緞帶最多可以做幾個蝴蝶結？`,
    answerNum: answer,
    answerText: `${answer} 個`,
    trap: `${meters} 公尺要先換成 ${totalCm} 公分，不能直接用 ${meters}÷${perCm}。`,
  };
}

// ⑤-2：公升 ↔ 毫升
function templateJuice() {
  const perBottle = pick([250, 500]);
  const bottles = randInt(3, 6);
  const totalMl = perBottle * bottles;
  const drinkL = randInt(1, Math.floor(totalMl / 1000));
  const answer = totalMl - drinkL * 1000;
  if (answer <= 0) return null;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `一瓶果汁 ${perBottle} 毫升。${name}家買了 ${bottles} 瓶，全家喝掉 ${drinkL} 公升，還剩下多少毫升？`,
    answerNum: answer,
    answerText: `${answer} 毫升`,
    trap: `喝掉的量用「公升」，要換成 ${drinkL * 1000} 毫升再減；剩下用「毫升」回答。`,
  };
}

// ⑤-3：分 ↔ 秒（＋時間短才是快）
function templateRace() {
  const [nameA, nameB] = twoNames();
  const minA = randInt(1, 2);
  const secA = randInt(5, 55);
  const totalA = minA * 60 + secA;
  const totalB = randInt(70, 175);
  if (totalB === totalA) return null;
  const faster = totalA < totalB ? nameA : nameB;
  const diff = Math.abs(totalA - totalB);
  return {
    category: CAT_UNIT,
    question: `運動會上，${nameA}跑了 ${minA} 分 ${secA} 秒，${nameB}跑了 ${totalB} 秒。誰跑得比較快？快了幾秒？`,
    answerNum: diff,                       // 對答案時只比對「快幾秒」的數字
    answerText: `${faster}比較快，快 ${diff} 秒`,
    trap: `${minA} 分 ${secA} 秒要換成 ${totalA} 秒再比；時間短的才是跑得快。`,
  };
}

// ⑤-4：公斤 ↔ 公克
function templateFlour() {
  const kg = randInt(1, 3);
  const used = randInt(2, kg * 10 - 1) * 100;
  const left = kg * 1000 - used;
  const name = pick(NAMES);
  return {
    category: CAT_UNIT,
    question: `一包麵粉重 ${kg} 公斤，${name}的媽媽做蛋糕用掉 ${used} 公克，還剩下多少公克？`,
    answerNum: left,
    answerText: `${left} 公克`,
    trap: `${kg} 公斤要先換成 ${kg * 1000} 公克再減：${kg * 1000}−${used}＝${left}，不能直接拿 ${kg} 去減。`,
  };
}

// ⑤-5：公里 ↔ 公尺
function templateWalk() {
  const km = randInt(1, 3);

// ⑤-6：時 ↔ 分
function templateMovie() {

// ⑥-1：年齡差不變——今年差幾歲，幾年後還是差幾歲

// ⑥-2：雞兔同籠（頭腳問題，三年級用湊的）

}

}

// ⑥-7：每天固定量的累加，再比對總量夠不夠

// ⑥-8：找規律填下一個（等差）
function templatePattern() {

  return {

    question: `照規律排下去：${seq.join('、')}、□。請問□是多少？`,

    trap: `每個數字都比前一個多 ${step}（${seq[1]}−${seq[0]}＝${step}），所以□＝${seq[3]}＋${step}＝${next}。`,
  };
}

}

// ⑥-12：時刻計算——經過多久（同一天，時＋分）
function templateElapsed() {
  const startH = randInt(1, 6);
  const durH = randInt(1, 3);
  const durM = pick([10, 15, 20, 30, 40, 45]);
  const endMinTotal = startH * 60 + durH * 60 + durM;
  const endH = Math.floor(endMinTotal / 60);
  const endM = endMinTotal % 60;
  if (endH > 11) return null;
  return {
    category: CAT_WORD,
    question: `電影從 ${startH} 點開始，演到 ${endH} 點 ${endM === 0 ? '整' : endM + ' 分'} 結束。這部電影一共演了幾分鐘？`,
    answerNum: durH * 60 + durM,
    answerText: `${durH * 60 + durM} 分鐘（${durH} 小時 ${durM} 分）`,
    trap: `從 ${startH} 點到 ${endH} 點是 ${durH} 小時＝${durH * 60} 分，再加上 ${durM} 分，共 ${durH * 60 + durM} 分鐘。`,
  };
}

// ---------- ⑦ 分數（三年級：真分數比大小、同分母加減） ----------
// 答案用「整數」表達：比大小→答較大的『分子』；同分母加減→答結果的『分子』（同分母下分子最能代表大小）

// ⑦-1：同分母比大小——分母相同，分子大的才大
function templateFracCompareSameDen() {
  const den = pick([4, 5, 6, 8, 10]);
  let a = randInt(1, den - 1);
  let b = randInt(1, den - 1);
  while (b === a) b = randInt(1, den - 1);
  const bigger = Math.max(a, b);
  return {
    category: CAT_FRAC,
    question: `${den} 分之 ${a} 和 ${den} 分之 ${b}，哪一個比較大？請回答比較大的那個的「分子」（上面的數字）。`,
    answerNum: bigger,
    answerText: `${den} 分之 ${bigger} 比較大（分子是 ${bigger}）`,
    trap: `分母都是 ${den}（分成一樣多份），這時候分子大的才大，所以 ${den} 分之 ${bigger} 比較大，分子是 ${bigger}。`,
  };
}

// ⑦-2：同分子比大小——分子相同，分母大的反而小（陷阱）
function templateFracCompareSameNum() {
  const num = randInt(1, 3);
  let d1 = pick([4, 5, 6, 8]);
  let d2 = pick([9, 10, 12]);
  // 確保是真分數
  const bigDen = Math.max(d1, d2), smallDen = Math.min(d1, d2);
  // 分子相同，分母小的比較大 → 較大的分母是 smallDen
  return {
    category: CAT_FRAC,
    question: `${smallDen} 分之 ${num} 和 ${bigDen} 分之 ${num}，哪一個比較大？請回答比較大的那個的「分母」（下面的數字）。`,
    answerNum: smallDen,
    answerText: `${smallDen} 分之 ${num} 比較大（分母是 ${smallDen}）`,
    trap: `陷阱！分子一樣是 ${num} 時，分母越大表示切得越細、每份越小。所以分母小的 ${smallDen} 分之 ${num} 反而比較大，不是分母大的那個。`,
  };
}

// ⑦-3：同分母加法——分母不變，只加分子
function templateFracAdd() {
  const den = pick([5, 6, 7, 8, 9, 10]);
  const a = randInt(1, den - 2);
  const b = randInt(1, den - 1 - a);
  const sum = a + b;
  return {
    category: CAT_FRAC,
    question: `${den} 分之 ${a} 加 ${den} 分之 ${b}，等於 ${den} 分之幾？請回答答案的「分子」。`,
    answerNum: sum,
    answerText: `${den} 分之 ${sum}（分子是 ${sum}）`,
    trap: `同分母相加，分母 ${den} 不變，只把分子相加：${a}＋${b}＝${sum}，答案是 ${den} 分之 ${sum}。分母不要也加起來！`,
  };
}

// ⑦-4：同分母減法——分母不變，只減分子
function templateFracSub() {
  const den = pick([5, 6, 7, 8, 9, 10]);
  const a = randInt(2, den - 1);
  const b = randInt(1, a - 1);
  const diff = a - b;
  return {
    category: CAT_FRAC,
    question: `${den} 分之 ${a} 減 ${den} 分之 ${b}，等於 ${den} 分之幾？請回答答案的「分子」。`,
    answerNum: diff,
    answerText: `${den} 分之 ${diff}（分子是 ${diff}）`,
    trap: `同分母相減，分母 ${den} 不變，只把分子相減：${a}−${b}＝${diff}，答案是 ${den} 分之 ${diff}。`,
  };
}

// ---------- ⑧ 一位小數（三下：小數加減、小數語意） ----------
// 為了讓數字鍵盤能輸入，答案設計成「用十分之幾表達」或「整數元／角」等單一整數

// ⑧-1：小數的語意——0.5 不是 5（幾分之幾）
function templateDecimalMeaning() {
  const tenths = randInt(1, 9);
  return {
    category: CAT_DECIMAL,
    question: `小數 0.${tenths} 表示十分之幾？請回答分子（十分之□的□）。`,
    answerNum: tenths,
    answerText: `十分之 ${tenths}（0.${tenths}）`,
    trap: `0.${tenths} 是把 1 平分成 10 份，取其中 ${tenths} 份，也就是「十分之 ${tenths}」，不是 ${tenths} 個 1。小數點後第一位是「十分位」。`,
  };
}

// ⑧-2：一位小數加法——結果剛好進位成整數或帶小數，答案用「十分之幾」表達
function templateDecimalAdd() {
  const a = randInt(1, 9);          // 0.a
  const bb = randInt(1, 9);         // 0.bb
  const sumTenths = a + bb;         // 以十分之表達的總和（10~18 時代表 1.x）
  return {
    category: CAT_DECIMAL,
    question: `0.${a} 加 0.${bb} 等於多少？因為答案是小數，請用「十分之幾」回答（例如 1.2 就回答 12）。`,
    answerNum: sumTenths,
    answerText: `${(sumTenths / 10).toFixed(1)}（也就是十分之 ${sumTenths}）`,
    trap: `0.${a}＝十分之 ${a}、0.${bb}＝十分之 ${bb}，相加是十分之 ${sumTenths}，也就是 ${(sumTenths / 10).toFixed(1)}。小數相加時小數點要對齊，別把 ${a}＋${bb} 當整數個位加。`,
  };
}

// ⑧-3：元角——1 元＝10 角，小數與錢幣（塊/角）
function templateDecimalMoney() {

  };
}

// ---------- ⑨ 面積／周長（三年級：單位方格數面積、長方形周長） ----------

// ⑨-1：長方形面積（用單位方格／長×寬）
function templateRectArea() {
  const w = randInt(2, 9);
  const h = randInt(2, 9);
  if (w === h) return null;      // 避免變成正方形另做
  const area = w * h;
  return {
    category: CAT_AREA,
    question: `一個長方形，長 ${w} 公分、寬 ${h} 公分。它的面積是幾平方公分？`,
    answerNum: area,
    answerText: `${area} 平方公分`,
    trap: `面積是「長 × 寬」＝${w}×${h}＝${area} 平方公分（也就是排滿幾個 1 平方公分的方格）。別和周長搞混：面積用乘的，周長才是把四邊加起來。`,
  };
}

// ⑨-2：長方形周長——四邊加起來（陷阱：容易只加長＋寬）
function templateRectPerimeter() {
  const w = randInt(3, 12);
  const h = randInt(2, 10);
  if (w === h) return null;
  const peri = (w + h) * 2;
  return {
    category: CAT_AREA,
    question: `一個長方形，長 ${w} 公分、寬 ${h} 公分。繞它一圈（周長）一共是幾公分？`,
    answerNum: peri,
    answerText: `${peri} 公分`,
    trap: `長方形有兩條長、兩條寬，周長＝(${w}＋${h})×2＝${peri} 公分。陷阱：只算 ${w}＋${h}＝${w + h} 就少算了另一組兩條邊。`,
  };
}

// ⑨-3：正方形周長——一邊 ×4
function templateSquarePerimeter() {
  const side = randInt(3, 15);
  const peri = side * 4;
  return {
    category: CAT_AREA,
    question: `一個正方形，每一邊都是 ${side} 公分。它的周長是幾公分？`,
    answerNum: peri,
    answerText: `${peri} 公分`,
    trap: `正方形四邊一樣長，周長＝${side}×4＝${peri} 公分，不是 ${side}×2。`,
  };
}

// ---------- ⑩ 日期（跨星期／跨月，算頭算尾的陷阱） ----------

// ⑩-1：從某日到某日共幾天（含頭含尾，容易少算 1）
function templateDateInclusive() {
  const start = randInt(3, 15);
  const span = randInt(4, 12);
  const end = start + span;
  const days = end - start + 1;   // 含頭含尾
  return {
    category: CAT_DATE,
    question: `暑假活動從 7 月 ${start} 日開始，到 7 月 ${end} 日結束（頭尾兩天都算）。一共有幾天？`,
    answerNum: days,
    answerText: `${days} 天`,
    trap: `陷阱：不是 ${end}−${start}＝${end - start}！開始那天也要算進去，${end}−${start}＋1＝${days} 天（頭尾都含）。`,
  };
}

// ⑩-2：某日的幾天後是幾號（跨月，別忘了當月天數）
function templateDateAcrossMonth() {
  const monthDays = pick([[4, 30], [6, 30], [9, 30], [11, 30], [3, 31], [5, 31], [7, 31], [8, 31]]);
  const [month, dim] = monthDays;
  const start = randInt(dim - 4, dim - 1);   // 靠近月底（dim-4 ~ dim-1）
  const end = randInt(1, 5);                 // 下個月的 1~5 號
  const add = (dim - start) + end;           // 反推要過幾天，保證真的跨月且日≥1
  return {
    category: CAT_DATE,
    question: `${month} 月有 ${dim} 天。從 ${month} 月 ${start} 日開始，過了 ${add} 天之後是幾月幾日？請回答「日」（幾號）。`,
    answerNum: end,
    answerText: `${month + 1} 月 ${end} 日`,
    trap: `${start}＋${add}＝${start + add} 已經超過 ${month} 月的 ${dim} 天，要跨月：${start + add}−${dim}＝${end}，所以是 ${month + 1} 月 ${end} 日。`,
  };
}

// ⑩-3：星期幾——幾天後是星期幾（用 7 的餘數）
// 答案用 1~7 表示星期一~日（避免數字鍵盤無法輸入開頭 0）
function templateWeekday() {
  const WD = ['一', '二', '三', '四', '五', '六', '日']; // 索引 0~6 ↔ 答案 1~7
  const startIdx = randInt(0, 6);
  const add = randInt(8, 25);
  const endIdx = (startIdx + add) % 7;
  return {
    category: CAT_DATE,
    question: `今天是星期${WD[startIdx]}。過了 ${add} 天以後是星期幾？請用數字回答（星期一到日就填 1 到 7）。`,
    answerNum: endIdx + 1,
    answerText: `星期${WD[endIdx]}（填 ${endIdx + 1}）`,
    trap: `每 7 天星期就轉一圈。${add}÷7＝${Math.floor(add / 7)} 週餘 ${add % 7} 天，從星期${WD[startIdx]}再往後數 ${add % 7} 天就是星期${WD[endIdx]}。`,
  };
}

const TEMPLATES = [
  // ① 語意陷阱
  templateCompareSave, templateQueueTotal, templateQueuePosition, templateIncreaseTo,
  // ④ 多餘／不足條件
  templateShopExtra, templateBusCeil, templateBoxFloor, templateCandyExtra,
  // ⑤ 單位陷阱
  templateRibbon, templateJuice, templateRace, templateFlour, templateWalk, templateMovie,
  // ⑥ 動腦應用題
  templateAgeGap, templateChickenRabbit, templateBoatTrips, templateGiveAway,
  templateSharePlus, templateTimesAs, templateReadDays, templatePattern,
  templatePatternMul, templateReverse, templateWeeks, templateElapsed,
  // ⑦ 分數
  templateFracCompareSameDen, templateFracCompareSameNum, templateFracAdd, templateFracSub,
  // ⑧ 一位小數
  templateDecimalMeaning, templateDecimalAdd, templateDecimalMoney,
  // ⑨ 面積／周長
  templateRectArea, templateRectPerimeter, templateSquarePerimeter,
  // ⑩ 日期
  templateDateInclusive, templateDateAcrossMonth, templateWeekday,
];

function genOne() {
  for (let i = 0; i < 50; i++) {
    const q = pick(TEMPLATES)();
    if (q) return q;
  }
  throw new Error('抽不到合格題目');
}

// ====== 音效（沿用 aiaili_math 的預熱池 + iOS 解鎖機制） ======
const SOUND_FILES = { ding: 'ding.mp3', eoh: 'eoh.mp3', cheer: 'cheer.mp3' };
const SOUND_BASE = 'assets/sounds/';
const POOL_SIZE = 2;
const pools = { ding: [], eoh: [], cheer: [] };
function makeElement(name) {
  const el = new Audio(SOUND_BASE + SOUND_FILES[name]);
  el.preload = 'auto'; el.load();
  return el;
}
for (const name of Object.keys(SOUND_FILES))
  for (let i = 0; i < POOL_SIZE; i++) pools[name].push(makeElement(name));

let audioUnlocked = false, unlockInFlight = false;
// iOS 要「在使用者手勢內真的播一次聲音（不能靜音）」才會解鎖 audio channel。
function unlockSounds() {
  if (audioUnlocked || unlockInFlight) return;
  unlockInFlight = true;
  const dummy = new Audio(SOUND_BASE + SOUND_FILES.ding);
  dummy.play()
    .then(() => { audioUnlocked = true; unlockInFlight = false; })
    .catch(() => { unlockInFlight = false; });
}
const uh = () => unlockSounds();
document.addEventListener('touchstart', uh, { capture: true, passive: true });
document.addEventListener('touchend', uh, { capture: true, passive: true });
document.addEventListener('mousedown', uh, { capture: true });
document.addEventListener('click', uh, { capture: true });
function playSound(name) {
  const pool = pools[name];
  let el = pool.find((e) => e.paused || e.ended);
  if (!el) el = makeElement(name);
  else if (el.currentTime !== 0) el.currentTime = 0;
  el.play().catch(() => {});
}

// ====== 慶祝畫面（仿 aiaili_math） ======
const CELE_EMOJIS = ['⭐','✨','🎉','🌟','🎊','🌸'];
const CELE_DURATION = 3600;
function renderCeleSparkles() {
  const el = $('celeSparkles');
  el.innerHTML = '';
  const spots = [
    [10,16],[86,20],[20,72],[80,76],[50,10],[8,46],
    [92,50],[42,88],[66,90],[30,30],[72,34],[16,60],
  ];
  spots.forEach(([left, top], i) => {
    const s = document.createElement('span');
    s.textContent = CELE_EMOJIS[i % CELE_EMOJIS.length];
    s.style.left = left + '%';
    s.style.top = top + '%';
    s.style.animationDelay = (i * 0.12 % 1.2) + 's';
    el.appendChild(s);
  });
}
function playCelebration() {
  playSound('cheer');
  renderCeleSparkles();
  const celebrate = $('celebrate');
  celebrate.classList.remove('fade');
  celebrate.classList.add('show');
  const img = celebrate.querySelector('.cele-img');
  if (img) { img.style.animation = 'none'; void img.offsetWidth; img.style.animation = ''; }
  setTimeout(() => celebrate.classList.add('fade'), CELE_DURATION - 500);
  setTimeout(() => celebrate.classList.remove('show', 'fade'), CELE_DURATION);
}

// ====== 純練習模式：答錯可一直重試，累計答對 8 題有慶祝 ======
// 累計制：只要一題最後答對就 +1（答錯不歸零、不扣），累積到 8 就慶祝並歸零重算
const STREAK_GOAL = 8;       // 累計答對幾題觸發慶祝
let current = null;          // 這一題
let solved = false;          // 這一題是否已「答對」（答對後鎖鍵盤、等自動換題）
let streak = 0;              // 目前累計答對題數
let autoAdvanceTimer = null; // 答對後自動換題的計時器
let advancing = false;       // 前進中旗標，避免自動換題與手動按鈕重複觸發
let inputStr = '';           // 目前用鍵盤輸入的數字字串

function $(id) { return document.getElementById(id); }

// 鍵盤輸入：更新顯示框
function renderInput() {
  const val = $('answerVal');
  if (inputStr === '') { val.textContent = '?'; val.className = 'val empty'; }
  else { val.textContent = inputStr; val.className = 'val filled'; }
}
function appendDigit(d) {
  if (solved) return;                       // 已答對、等換題時不再輸入
  if (inputStr.length >= 6) return;         // 三年級答案不會超過六位數
  if (inputStr === '' && Number(d) === 0) return; // 不讓開頭是 0
  inputStr += String(d);
  renderInput();
}
function backspace() {
  if (solved) return;
  inputStr = inputStr.slice(0, -1);
  renderInput();
}

// 進度列：以「累計答對進度」呈現，答對幾題就亮幾顆
function renderProgress() {
  const dots = $('progressDots');
  dots.innerHTML = '';
  for (let i = 0; i < STREAK_GOAL; i++) {
    const d = document.createElement('span');
    d.className = 'dot';
    if (i < streak) d.classList.add('ok');
    dots.appendChild(d);
  }
  $('progressText').textContent = `答對 ${streak} / ${STREAK_GOAL}`;
}

function loadQuestion() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  current = genOne();
  solved = false;
  inputStr = '';
  renderInput();
  $('answerBox').classList.remove('answered');
  $('tag').textContent = current.category;
  $('question').textContent = current.question;
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('explain').classList.remove('show');
  setPadDisabled(false);
  $('nextBtn').disabled = false;
  $('nextBtn').textContent = '下一題 ➜';
  renderProgress();
}

// 鎖住／解鎖整個數字鍵盤（含「對答案」）
function setPadDisabled(disabled) {
  $('pad').querySelectorAll('button').forEach(b => { b.disabled = disabled; });
}

function checkAnswer() {
  if (solved) return;                        // 已答對、等換題時忽略
  if (inputStr === '') {
    $('feedback').textContent = '先用鍵盤輸入一個答案再對答案喔～';
    $('feedback').className = 'feedback bad';
    return;
  }
  const num = parseInt(inputStr, 10);
  if (num === current.answerNum) {
    // 答對 → 播音效、亮進度、短暫停留後自動換下一題
    solved = true;
    setPadDisabled(true);
    $('answerBox').classList.add('answered');
    playSound('ding');
    streak++;
    renderProgress();
    if (streak >= STREAK_GOAL) {
      $('feedback').textContent = '🏆 答對 8 題，太厲害了！';
      $('feedback').className = 'feedback ok';
      $('nextBtn').disabled = true;
      playCelebration();
      streak = 0;                            // 慶祝後歸零，重新累積
      autoAdvanceTimer = setTimeout(advance, 1400);
    } else {
      $('feedback').textContent = '🎉 答對了！你有看清楚陷阱！';
      $('feedback').className = 'feedback ok';
      $('nextBtn').disabled = true;          // 自動換題期間先鎖住，避免重複前進
      autoAdvanceTimer = setTimeout(advance, 900);
    }
  } else {
    // 答錯 → 播音效、顯示訊息，但「不鎖鍵盤、不跑答案」，可以改答案再試一次
    // 累計答對制：答錯不歸零，只要這題最後答對仍會 +1
    playSound('eoh');
    $('feedback').textContent = '答錯了～再想想看，可以再試一次！';
    $('feedback').className = 'feedback bad';
  }
}

// 看答案：顯示正確答案＋解析，但「不鎖鍵盤」，看完仍可繼續作答
function showExplain() {
  $('answerText').textContent = current.answerText;
  $('trapText').textContent = current.trap;
  $('explain').classList.add('show');
}

// 前進到下一題；用 advancing 旗標防止自動換題與手動按鈕重複觸發
function advance() {
  if (advancing) return;
  advancing = true;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  loadQuestion();
  advancing = false;
}

// 按「下一題」：不管有沒有答對，直接換下一題（跳過這題；累計答對數保留不變）
function nextStep() {
  advance();
}

function startSet() {
  streak = 0;
  advancing = false;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  $('quizCard').style.display = '';
  loadQuestion();
}

// 數字鍵盤按鈕（0–9）
$('pad').querySelectorAll('button[data-d]').forEach(b =>
  b.addEventListener('click', () => appendDigit(parseInt(b.dataset.d, 10))));
$('delBtn').addEventListener('click', backspace);
$('checkBtn').addEventListener('click', checkAnswer);
$('showBtn').addEventListener('click', showExplain);
$('nextBtn').addEventListener('click', nextStep);

// 也支援實體鍵盤（電腦上更好用）
document.addEventListener('keydown', (e) => {
  if (e.key >= '0' && e.key <= '9') appendDigit(parseInt(e.key, 10));
  else if (e.key === 'Backspace') { e.preventDefault(); backspace(); }
  else if (e.key === 'Enter') { solved ? advance() : checkAnswer(); }
});

// 預載慶祝圖
(function preloadCele(){ const im = new Image(); im.src = 'assets/images/celebration.png'; })();
startSet();
</script>
